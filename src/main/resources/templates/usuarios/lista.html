<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/layout :: head('Usuários')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: navbar}"></th:block>

<div class="container-fluid">
    <div class="row g-0">
        <div class="col-md-2">
            <th:block th:replace="~{fragments/layout :: sidebar(activePage='usuarios')}"></th:block>
        </div>
        <div class="col-md-10 main-content">

            <div class="page-header">
                <h4 class="fw-bold mb-0"><i class="bi bi-people me-2"></i>Usuários</h4>
            </div>

            <th:block th:replace="~{fragments/layout :: alertas}"></th:block>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div th:if="${usuarios.empty}" class="p-4 text-center text-muted">
                        <i class="bi bi-person-x fs-1 d-block mb-2"></i>
                        Nenhum usuário cadastrado.
                    </div>
                    <div class="table-responsive" th:if="${!usuarios.empty}">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Nome</th>
                                <th>Email</th>
                                <th>Perfil</th>
                                <th class="text-end">Ações</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="u : ${usuarios}">
                                <td class="text-muted small" th:text="${u.id}"></td>
                                <td class="fw-semibold" th:text="${u.nome}"></td>
                                <td th:text="${u.email}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${u.role == 'ADMIN'} ? 'bg-danger' : 'bg-secondary'"
                                          th:text="${u.role}"></span>
                                </td>
                                <td class="text-end">
                                    <form th:action="@{/app/usuarios/{id}/deletar(id=${u.id})}"
                                          method="post" class="d-inline"
                                          onsubmit="return confirm('Confirmar exclusão do usuário?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <th:block th:replace="~{fragments/layout :: paginacao(pagina=${usuarios}, urlBase='/app/usuarios')}"></th:block>

        </div>
    </div>
</div>

<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
