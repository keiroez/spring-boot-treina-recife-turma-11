<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/layout :: head('Tarefas')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: navbar}"></th:block>

<div class="container-fluid">
    <div class="row g-0">
        <div class="col-md-2">
            <th:block th:replace="~{fragments/layout :: sidebar(activePage='tarefas')}"></th:block>
        </div>
        <div class="col-md-10 main-content">

            <div class="page-header">
                <h4 class="fw-bold mb-0"><i class="bi bi-check2-square me-2"></i>Tarefas</h4>
                <a href="/app/tarefas/novo" class="btn btn-primary">
                    <i class="bi bi-plus-lg me-1"></i>Nova Tarefa
                </a>
            </div>

            <th:block th:replace="~{fragments/layout :: alertas}"></th:block>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div th:if="${tarefas.empty}" class="p-4 text-center text-muted">
                        <i class="bi bi-clipboard-x fs-1 d-block mb-2"></i>
                        Nenhuma tarefa cadastrada. <a href="/app/tarefas/novo">Criar a primeira</a>.
                    </div>
                    <div class="table-responsive" th:if="${!tarefas.empty}">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Título</th>
                                <th>Projeto</th>
                                <th>Responsável</th>
                                <th>Prioridade</th>
                                <th>Status</th>
                                <th>Execução</th>
                                <th class="text-end">Ações</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="t : ${tarefas}">
                                <td class="text-muted small" th:text="${t.id}"></td>
                                <td class="fw-semibold" th:text="${t.titulo}"></td>
                                <td th:text="${t.projeto.nome}"></td>
                                <td th:text="${t.responsavel.nome}"></td>
                                <td>
                                    <span class="badge rounded-pill"
                                          th:classappend="'badge-' + ${t.prioridade}"
                                          th:text="${t.prioridade}"></span>
                                </td>
                                <td>
                                    <span class="badge rounded-pill"
                                          th:classappend="'badge-' + ${t.status}"
                                          th:text="${t.status}"></span>
                                </td>
                                <td th:text="${t.dataExecucao}"></td>
                                <td class="text-end">
                                    <a th:href="@{/app/tarefas/{id}/editar(id=${t.id})}"
                                       class="btn btn-sm btn-outline-secondary me-1">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/app/tarefas/{id}/deletar(id=${t.id})}"
                                          method="post" class="d-inline"
                                          onsubmit="return confirm('Confirmar exclusão?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <th:block th:replace="~{fragments/layout :: paginacao(pagina=${tarefas}, urlBase='/app/tarefas')}"></th:block>

        </div>
    </div>
</div>

<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
