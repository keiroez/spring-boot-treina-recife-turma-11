<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/layout :: head(${tarefa != null} ? 'Editar Tarefa' : 'Nova Tarefa')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: navbar}"></th:block>

<div class="container-fluid">
    <div class="row g-0">
        <div class="col-md-2">
            <th:block th:replace="~{fragments/layout :: sidebar(activePage='tarefas')}"></th:block>
        </div>
        <div class="col-md-10 main-content">

            <div class="page-header">
                <h4 class="fw-bold mb-0">
                    <i class="bi bi-check2-square me-2"></i>
                    <span th:text="${tarefa != null} ? 'Editar Tarefa' : 'Nova Tarefa'"></span>
                </h4>
                <a href="/app/tarefas" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Voltar
                </a>
            </div>

            <div class="card border-0 shadow-sm" style="max-width: 700px;">
                <div class="card-body p-4">
                    <form th:action="${tarefa != null} ? @{/app/tarefas/{id}/editar(id=${tarefa.id})} : @{/app/tarefas/novo}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Título <span class="text-danger">*</span></label>
                            <input type="text" name="titulo" class="form-control" maxlength="150" required
                                   th:value="${tarefa?.titulo}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Descrição</label>
                            <textarea name="descricao" class="form-control" rows="3"
                                      th:text="${tarefa?.descricao}"></textarea>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Prioridade <span class="text-danger">*</span></label>
                                <select name="prioridade" class="form-select" required>
                                    <option value="">Selecione...</option>
                                    <option th:each="p : ${prioridades}"
                                            th:value="${p}"
                                            th:text="${p}"
                                            th:selected="${tarefa?.prioridade == p}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Status <span class="text-danger">*</span></label>
                                <select name="status" class="form-select" required>
                                    <option value="">Selecione...</option>
                                    <option th:each="s : ${statusList}"
                                            th:value="${s}"
                                            th:text="${s}"
                                            th:selected="${tarefa?.status == s}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Projeto <span class="text-danger">*</span></label>
                                <select name="projetoId" class="form-select" required>
                                    <option value="">Selecione...</option>
                                    <option th:each="proj : ${projetos}"
                                            th:value="${proj.id}"
                                            th:text="${proj.nome}"
                                            th:selected="${tarefa?.projeto?.id == proj.id}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Responsável <span class="text-danger">*</span></label>
                                <select name="responsavelId" class="form-select" required>
                                    <option value="">Selecione...</option>
                                    <option th:each="u : ${usuarios}"
                                            th:value="${u.id}"
                                            th:text="${u.nome}"
                                            th:selected="${tarefa?.responsavel?.id == u.id}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Data de Execução <span class="text-danger">*</span></label>
                            <input type="date" name="dataExecucao" class="form-control" required
                                   th:value="${tarefa?.dataExecucao}">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-floppy me-1"></i>
                                <span th:text="${tarefa != null} ? 'Salvar Alterações' : 'Criar Tarefa'"></span>
                            </button>
                            <a href="/app/tarefas" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
