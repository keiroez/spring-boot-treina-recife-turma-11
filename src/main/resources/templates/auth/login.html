<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh; background:#212529;">

<div class="card shadow" style="width: 100%; max-width: 400px;">
    <div class="card-body p-4">
        <div class="text-center mb-4">
            <i class="bi bi-kanban-fill text-primary fs-1"></i>
            <h4 class="mt-2 fw-bold">Gestão de Projetos</h4>
            <p class="text-muted small">Faça login para continuar</p>
        </div>

        <div th:if="${erro}" class="alert alert-danger py-2">
            <i class="bi bi-exclamation-triangle me-1"></i>
            <span th:text="${erro}"></span>
        </div>
        <div th:if="${msg}" class="alert alert-success py-2">
            <i class="bi bi-check-circle me-1"></i>
            <span th:text="${msg}"></span>
        </div>

        <form th:action="@{/app/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="username" name="username"
                           class="form-control" placeholder="seu@email.com" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" name="password"
                           class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
            </button>
        </form>
    </div>
</div>

<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
